name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── macOS: universal binary needs both targets ──────────────────────────
      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Read version from package.json
        id: pkg_version
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          VERSION_NO_V="${{ steps.pkg_version.outputs.version }}"
          VERSION_NO_V="${VERSION_NO_V#v}"

          SECTION=$(awk -v version="$VERSION_NO_V" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && $0 ~ /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md)

          if [ -z "$SECTION" ]; then
            echo "notes=No changelog entry found for version ${VERSION_NO_V}." >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<EOF"
              printf '%s\n' "$SECTION"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system libs (not used here but keep for potential future runs) ──

      # ── Build & publish ──────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.pkg_version.outputs.version }}
          releaseName: "TimeLens ${{ steps.pkg_version.outputs.version }}"
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
